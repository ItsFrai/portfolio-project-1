<!DOCTYPE html>
<html>
  <head>
    <title>Cloud Portfolio Project</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #0f0f0f;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      .card {
        background-color: #1a1a2e;
        border: 1px solid #00d4ff;
        padding: 50px;
        border-radius: 12px;
        text-align: center;
        max-width: 600px;
      }
      h1 { color: #00d4ff; font-size: 42px; }
      p { font-size: 18px; color: #aaaaaa; }
      .badge {
        background-color: #00d4ff;
        color: #0f0f0f;
        padding: 8px 16px;
        border-radius: 20px;
        font-weight: bold;
        display: inline-block;
        margin: 8px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Cloud Portfolio Project</h1>
      <p>Deployed automatically using:</p>
      <div>
        <span class="badge">AWS EC2</span>
        <span class="badge">Docker</span>
        <span class="badge">Terraform</span>
      </div>
      <p>Built by ItsFrai | AWS | Docker | Terraform | CI/CD</p>
    </div>
  </body>
</html>
